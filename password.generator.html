<!DOCTYPE html>
<html>
<body>

  
<h2>Password Generator</h2>
<button onclick="gen()">Generate</button>
<h3 id="pass"></h3>

<script>
function gen(){
  let chars="abcdefghijklmnopqrstuvwxyz123456789";
  let p="";
  for(let i=0;i<10;i++){
    p+=chars[Math.floor(Math.random()*chars.length)];
  }
  pass.innerText=p;
}
</script>

</body>
</html>
